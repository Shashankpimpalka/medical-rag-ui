<div class="chat-container">
  <div class="chat-header">
    <span class="status-dot"></span>
    <h3>Medical Assistant Chat</h3>
  </div>

  <!-- Messages Window Box -->
  <div class="messages-window" #scrollContainer>
    <div *ngFor="let msg of messages()" class="message-row" [ngClass]="msg.role">
      <div class="avatar">
        {{ msg.role === 'user' ? '👤' : '🤖' }}
      </div>
      <div class="message-bubble">
        <div class="sender-name">{{ msg.role === 'user' ? 'You' : 'AI Assistant' }}</div>
        <div class="message-text">{{ msg.text }}</div>
      </div>
    </div>
    
    <!-- Empty State Placeholder -->
    <div *ngIf="messages().length === 0" class="empty-state">
      <p>Ask a question about your uploaded medical documents to get started.</p>
    </div>
  </div>

  <!-- Input Control Dock -->
  <div class="input-container">
    <input 
      [(ngModel)]="query" 
      placeholder="Ask your question here..." 
      (keyup.enter)="send()"
      class="chat-input" 
    />
    <button class="send-btn" [disabled]="!query.trim()" (click)="send()">
      <span class="send-icon">➔</span>
    </button>
  </div>
</div>
